openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Golf Charity Subscription Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: subscriptions
    description: Subscription management
  - name: scores
    description: Golf score management
  - name: charities
    description: Charity management
  - name: draws
    description: Draw/lottery management
  - name: winners
    description: Winner management
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserWithSubscription"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithSubscription"
        "404":
          description: User not found

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # Subscriptions
  /subscriptions:
    post:
      operationId: createSubscription
      tags: [subscriptions]
      summary: Create a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionBody"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/my:
    get:
      operationId: getMySubscription
      tags: [subscriptions]
      summary: Get current user's subscription
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "404":
          description: No subscription

  /subscriptions/{id}/cancel:
    patch:
      operationId: cancelSubscription
      tags: [subscriptions]
      summary: Cancel a subscription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subscription cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/{id}/renew:
    patch:
      operationId: renewSubscription
      tags: [subscriptions]
      summary: Renew a subscription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subscription renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  # Scores
  /scores:
    get:
      operationId: listMyScores
      tags: [scores]
      summary: Get current user's scores (newest first)
      responses:
        "200":
          description: List of scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Score"

    post:
      operationId: addScore
      tags: [scores]
      summary: Add a golf score (removes oldest if 6th)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddScoreBody"
      responses:
        "201":
          description: Score added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"

  /scores/{id}:
    patch:
      operationId: updateScore
      tags: [scores]
      summary: Update a score
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScoreBody"
      responses:
        "200":
          description: Score updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"

    delete:
      operationId: deleteScore
      tags: [scores]
      summary: Delete a score
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Score deleted

  /scores/user/{userId}:
    get:
      operationId: getUserScores
      tags: [scores]
      summary: Get scores for a user (admin)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Score"

  # Charities
  /charities:
    get:
      operationId: listCharities
      tags: [charities]
      summary: List all charities
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of charities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Charity"

    post:
      operationId: createCharity
      tags: [charities]
      summary: Create a charity (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharityBody"
      responses:
        "201":
          description: Charity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charity"

  /charities/featured:
    get:
      operationId: getFeaturedCharities
      tags: [charities]
      summary: Get featured charities for homepage
      responses:
        "200":
          description: Featured charities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Charity"

  /charities/{id}:
    get:
      operationId: getCharity
      tags: [charities]
      summary: Get charity by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Charity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charity"
        "404":
          description: Not found

    patch:
      operationId: updateCharity
      tags: [charities]
      summary: Update a charity (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCharityBody"
      responses:
        "200":
          description: Charity updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charity"

    delete:
      operationId: deleteCharity
      tags: [charities]
      summary: Delete a charity (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /charities/my-selection:
    get:
      operationId: getMyCharitySelection
      tags: [charities]
      summary: Get current user's charity selection
      responses:
        "200":
          description: User charity selection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCharity"
        "404":
          description: No selection

    post:
      operationId: setMyCharitySelection
      tags: [charities]
      summary: Set current user's charity selection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCharitySelectionBody"
      responses:
        "200":
          description: Selection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCharity"

  # Draws
  /draws:
    get:
      operationId: listDraws
      tags: [draws]
      summary: List all draws
      responses:
        "200":
          description: List of draws
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Draw"

    post:
      operationId: createDraw
      tags: [draws]
      summary: Create a draw (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDrawBody"
      responses:
        "201":
          description: Draw created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draw"

  /draws/latest:
    get:
      operationId: getLatestDraw
      tags: [draws]
      summary: Get the most recent published draw
      responses:
        "200":
          description: Latest draw with results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrawWithResults"
        "404":
          description: No draws yet

  /draws/{id}:
    get:
      operationId: getDraw
      tags: [draws]
      summary: Get draw by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Draw
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrawWithResults"

  /draws/{id}/simulate:
    post:
      operationId: simulateDraw
      tags: [draws]
      summary: Simulate a draw (preview, admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Simulation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrawSimulationResult"

  /draws/{id}/publish:
    post:
      operationId: publishDraw
      tags: [draws]
      summary: Publish/execute the final draw (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Draw published with results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrawWithResults"

  # Winners
  /winners:
    get:
      operationId: listWinners
      tags: [winners]
      summary: List winners (admin sees all, user sees own)
      responses:
        "200":
          description: List of winners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Winner"

  /winners/{id}/upload-proof:
    post:
      operationId: uploadWinnerProof
      tags: [winners]
      summary: Upload proof image URL for winner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadProofBody"
      responses:
        "200":
          description: Proof uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Winner"

  /winners/{id}/verify:
    patch:
      operationId: verifyWinner
      tags: [winners]
      summary: Approve or reject winner proof (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyWinnerBody"
      responses:
        "200":
          description: Winner verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Winner"

  /winners/{id}/mark-paid:
    patch:
      operationId: markWinnerPaid
      tags: [winners]
      summary: Mark winner as paid (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Winner marked as paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Winner"

  # Admin analytics
  /admin/analytics:
    get:
      operationId: getAnalytics
      tags: [admin]
      summary: Get platform analytics
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analytics"

  /admin/prize-pool:
    get:
      operationId: getPrizePool
      tags: [admin]
      summary: Get current prize pool status
      responses:
        "200":
          description: Prize pool info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrizePool"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
        charityId:
          type: ["integer", "null"]
        charityPercent:
          type: ["integer", "null"]
      required:
        - email
        - password
        - name

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - role
        - createdAt

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]

    UserWithSubscription:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        subscription:
          oneOf:
            - $ref: "#/components/schemas/Subscription"
            - type: "null"
      required:
        - id
        - email
        - name
        - role
        - createdAt

    Subscription:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        plan:
          type: string
        status:
          type: string
        amount:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: ["string", "null"]
          format: date-time
        renewalDate:
          type: ["string", "null"]
          format: date-time
        stripeSubscriptionId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - plan
        - status
        - amount
        - startDate
        - createdAt

    CreateSubscriptionBody:
      type: object
      properties:
        plan:
          type: string
        paymentMethodId:
          type: ["string", "null"]
      required:
        - plan

    Score:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        value:
          type: integer
        scoreDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - value
        - scoreDate
        - createdAt

    AddScoreBody:
      type: object
      properties:
        value:
          type: integer
        scoreDate:
          type: string
          format: date-time
      required:
        - value
        - scoreDate

    UpdateScoreBody:
      type: object
      properties:
        value:
          type: integer
        scoreDate:
          type: string
          format: date-time

    Charity:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
        imageUrl:
          type: ["string", "null"]
        websiteUrl:
          type: ["string", "null"]
        featured:
          type: boolean
        totalContributions:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - category
        - featured
        - totalContributions
        - createdAt

    CreateCharityBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        imageUrl:
          type: ["string", "null"]
        websiteUrl:
          type: ["string", "null"]
        featured:
          type: boolean
      required:
        - name
        - description
        - category

    UpdateCharityBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        imageUrl:
          type: ["string", "null"]
        websiteUrl:
          type: ["string", "null"]
        featured:
          type: boolean

    UserCharity:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        charityId:
          type: integer
        charityPercent:
          type: integer
        charity:
          $ref: "#/components/schemas/Charity"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - charityId
        - charityPercent
        - charity
        - createdAt

    SetCharitySelectionBody:
      type: object
      properties:
        charityId:
          type: integer
        charityPercent:
          type: integer
      required:
        - charityId
        - charityPercent

    Draw:
      type: object
      properties:
        id:
          type: integer
        month:
          type: integer
        year:
          type: integer
        status:
          type: string
        prizePool:
          type: number
        jackpotRollover:
          type: number
        drawnNumbers:
          type: ["string", "null"]
        algorithm:
          type: string
        publishedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - month
        - year
        - status
        - prizePool
        - jackpotRollover
        - algorithm
        - createdAt

    CreateDrawBody:
      type: object
      properties:
        month:
          type: integer
        year:
          type: integer
        algorithm:
          type: string
        jackpotRollover:
          type: number
      required:
        - month
        - year

    DrawResult:
      type: object
      properties:
        id:
          type: integer
        drawId:
          type: integer
        userId:
          type: integer
        matchTier:
          type: integer
        prizeAmount:
          type: number
        userName:
          type: string
        userEmail:
          type: string
      required:
        - id
        - drawId
        - userId
        - matchTier
        - prizeAmount
        - userName
        - userEmail

    DrawWithResults:
      type: object
      properties:
        id:
          type: integer
        month:
          type: integer
        year:
          type: integer
        status:
          type: string
        prizePool:
          type: number
        jackpotRollover:
          type: number
        drawnNumbers:
          type: ["string", "null"]
        algorithm:
          type: string
        publishedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        results:
          type: array
          items:
            $ref: "#/components/schemas/DrawResult"
      required:
        - id
        - month
        - year
        - status
        - prizePool
        - jackpotRollover
        - algorithm
        - createdAt
        - results

    DrawSimulationResult:
      type: object
      properties:
        drawnNumbers:
          type: array
          items:
            type: integer
        tier5Winners:
          type: array
          items:
            $ref: "#/components/schemas/DrawResult"
        tier4Winners:
          type: array
          items:
            $ref: "#/components/schemas/DrawResult"
        tier3Winners:
          type: array
          items:
            $ref: "#/components/schemas/DrawResult"
        prizePool:
          type: number
      required:
        - drawnNumbers
        - tier5Winners
        - tier4Winners
        - tier3Winners
        - prizePool

    Winner:
      type: object
      properties:
        id:
          type: integer
        drawId:
          type: integer
        userId:
          type: integer
        matchTier:
          type: integer
        prizeAmount:
          type: number
        status:
          type: string
        proofUrl:
          type: ["string", "null"]
        adminNote:
          type: ["string", "null"]
        userName:
          type: string
        userEmail:
          type: string
        drawMonth:
          type: integer
        drawYear:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - drawId
        - userId
        - matchTier
        - prizeAmount
        - status
        - userName
        - userEmail
        - drawMonth
        - drawYear
        - createdAt

    UploadProofBody:
      type: object
      properties:
        proofUrl:
          type: string
      required:
        - proofUrl

    VerifyWinnerBody:
      type: object
      properties:
        approved:
          type: boolean
        adminNote:
          type: ["string", "null"]
      required:
        - approved

    Analytics:
      type: object
      properties:
        totalUsers:
          type: integer
        activeSubscribers:
          type: integer
        totalPrizePool:
          type: number
        totalCharityContributions:
          type: number
        totalDraws:
          type: integer
        totalWinners:
          type: integer
        monthlyRevenue:
          type: number
        pendingPayouts:
          type: integer
      required:
        - totalUsers
        - activeSubscribers
        - totalPrizePool
        - totalCharityContributions
        - totalDraws
        - totalWinners
        - monthlyRevenue
        - pendingPayouts

    PrizePool:
      type: object
      properties:
        currentPool:
          type: number
        jackpotRollover:
